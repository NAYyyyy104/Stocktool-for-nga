services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: stocktool-backend
    restart: unless-stopped
    environment:
      - CGP_HOST=0.0.0.0
      - CGP_PORT=8765
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: stocktool-frontend
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "8080:80"
